                            <button type="button" id="btn-tab-mcdonalds" onclick="switchStore('mcdonalds')" class="py-3 text-[10px] font-black rounded-xl transition cursor-pointer flex flex-col sm:flex-row items-center justify-center gap-1 bg-amber-500 text-slate-950">

                            </button>

        function buildActiveVendorLayout() {
            const container = document.getElementById('glovo-categories');
            container.innerHTML = ""; 
            const currentCats = storeCategories[currentActiveStore];

            for (let catKey in currentCats) {
                let itemsList = storeProducts.filter(p => p.store === currentActiveStore && p.cat === catKey);
                if (itemsList.length === 0) continue;

                let catSection = document.createElement('div');
                catSection.className = "space-y-3";
                catSection.innerHTML = `
                    <h4 class="text-xs font-black uppercase text-slate-400 tracking-wider flex items-center gap-2 border-b border-slate-800/50 pb-2">
                        <span class="w-1.5 h-3 bg-amber-500 rounded-full"></span> ${currentCats[catKey]}
                    </h4>
                    <div class="grid gap-2" id="grid-${catKey}"></div>
                `;
                container.appendChild(catSection);

                let grid = document.getElementById(`grid-${catKey}`);
                itemsList.forEach(item => {
                    let descriptionText = item.desc ? `<p class="text-[10px] text-slate-500 line-clamp-1">${item.desc}</p>` : '';
                    let cardHTML = `
                        <div class="bg-slate-950 border border-slate-800/80 rounded-2xl p-4 flex items-center justify-between shadow-sm">
                            <div class="pr-2">
                                <h5 class="text-xs font-bold text-white">${item.name}</h5>
                                ${descriptionText}
                                <span class="text-xs font-extrabold text-amber-500 block mt-1">${item.price},00 MAD</span>
                            </div>
                            <div class="flex items-center gap-3 bg-slate-900 px-3 py-1.5 rounded-xl border border-slate-800 shrink-0">
                                <button type="button" onclick="changeQty('${item.id}', -1)" class="text-xs font-bold text-slate-400 hover:text-white px-1 cursor-pointer select-none">-</button>
                                <span id="qty-node-${item.id}" class="text-xs font-bold w-4 text-center text-white">${cart[item.id]}</span>
                                <button type="button" onclick="changeQty('${item.id}', 1)" class="text-xs font-bold text-slate-400 hover:text-white px-1 cursor-pointer select-none">+</button>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHTML;
                });
            }
        }

        function switchStore(storeKey) {
            currentActiveStore = storeKey;
            const btnMcD = document.getElementById('btn-tab-mcdonalds');
            const btnOsnap = document.getElementById('btn-tab-osnap');
            const btnTchoco = document.getElementById('btn-tab-tchoco');
            const btnKfc = document.getElementById('btn-tab-kfc');
            
            [btnMcD, btnOsnap, btnTchoco, btnKfc].forEach(btn => {
                btn.className = "py-3 text-[10px] font-black rounded-xl transition cursor-pointer flex flex-col sm:flex-row items-center justify-center gap-1 text-slate-400 hover:text-white text-center";
            });
            
            if (storeKey === 'mcdonalds') {
                btnMcD.className = "py-3 text-[10px] font-black rounded-xl transition cursor-pointer flex flex-col sm:flex-row items-center justify-center gap-1 bg-amber-500 text-slate-950 text-center";
            } else if (storeKey === 'osnap') {
                btnOsnap.className = "py-3 text-[10px] font-black rounded-xl transition cursor-pointer flex flex-col sm:flex-row items-center justify-center gap-1 bg-amber-500 text-slate-950 text-center";
            } else if (storeKey === 'tchoco') {
                btnTchoco.className = "py-3 text-[10px] font-black rounded-xl transition cursor-pointer flex flex-col sm:flex-row items-center justify-center gap-1 bg-amber-500 text-slate-950 text-center";
            } else {
                btnKfc.className = "py-3 text-[10px] font-black rounded-xl transition cursor-pointer flex flex-col sm:flex-row items-center justify-center gap-1 bg-amber-500 text-slate-950 text-center";
            }

            document.getElementById('displayVendorName').innerText = vendorNames[storeKey];
            buildActiveVendorLayout();
            calculateInvoice();
        }

        function changeQty(id, delta) {
            if (cart[id] !== undefined) {
                cart[id] = Math.max(0, cart[id] + delta);
                const qtyNode = document.getElementById(`qty-node-${id}`);
                if (qtyNode) {
                    qtyNode.innerText = cart[id];
                }
                calculateInvoice();
            }
        }

        function calculateInvoice() {
            let subtotal = 0;
            storeProducts.forEach(item => {
                if (cart[item.id] > 0) {
                    subtotal += item.price * cart[item.id];
                }
            });

            // تحديد ثمن التوصيل حسب الحي المختار
            const selectedQuartier = document.getElementById('clientQuartier').value;
            const deliveryFee = deliveryFeesByQuartier[selectedQuartier] || 20;
            
            const grandTotal = subtotal === 0 ? 0 : subtotal + deliveryFee;

            document.getElementById('displayItemCost').innerText = `${subtotal},00 MAD`;
            // تحديث الخانة في قائمة الحساب لايف
            document.querySelector('#checkout-card div div:nth-child(3) span:last-child').innerText = `${deliveryFee},00 MAD`;
            document.getElementById('displayTotal').innerText = `${grandTotal},00 MAD`;
        }

        // تفعيل التحديث التلقائي عند تغيير الحي
        document.getElementById('clientQuartier').addEventListener('change', calculateInvoice);

        function getLocation() {
            const geoText = document.getElementById('geo-text');
            const displayGPS = document.getElementById('displayGPS');
            
            if (navigator.geolocation) {
                geoText.innerText = "Recherche en cours...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        gpsCoordinates = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
                        displayGPS.value = `${position.coords.latitude.toFixed(5)}, ${position.coords.longitude.toFixed(5)}`;
                        geoText.innerText = "Position GPS Capturée ✅";
                    },
                    () => {
                        geoText.innerText = "Erreur de capture GPS";
                        gpsCoordinates = "Autorisation refusée";
                    }
                );
            } else {
                geoText.innerText = "GPS non supporté";
            }
        }

        function sendOrderToWhatsApp(event) {
            event.preventDefault();

            let subtotal = 0;
            let manifestItems = [];

            storeProducts.forEach(item => {
                if (cart[item.id] > 0) {
                    subtotal += item.price * cart[item.id];
                    manifestItems.push(`• ${item.name} (x${cart[item.id]}) - ${item.price * cart[item.id]} MAD`);
                }
            });

            if (manifestItems.length === 0) {
                alert("Votre panier est vide ! Veuillez ajouter des articles.");
                return;
            }

            const phone = document.getElementById('clientPhone').value;
            const quartier = document.getElementById('clientQuartier').value;
            const adresse = document.getElementById('clientAdresse').value;
            
            const deliveryFee = deliveryFeesByQuartier[quartier] || 20;
            const total = subtotal + deliveryFee;
            const restaurant = vendorNames[currentActiveStore];

            let message = `*🍔 NOUVELLE COMMANDE ALL OF ONE TNG 🍔*%0A%0A`;
            message += `*🏪 Restaurant:* ${restaurant}%0A`;
            message += `*📞 Tél Client:* ${phone}%0A%0A`;
            message += `*📋 Détails de la commande :*%0A${manifestItems.join('%0A')}%0A%0A`;
            message += `*📍 Adresse de Livraison :*%0A`;
            message += `• Quartier: ${quartier}%0A`;
            message += `• Complément: ${adresse}%0A`;
            message += `• GPS: ${gpsCoordinates}%0A%0A`;
            message += `---%0A`;
            message += `*💰 Sous-Total:* ${subtotal},00 MAD%0A`;
            message += `*🛵 Frais Livraison:* ${deliveryFee},00 MAD%0A`;
            message += `*💵 TOTAL À PAYER (COD):* ${total},00 MAD`;

            window.location.href = `https://wa.me/${MY_WHATSAPP_NUMBER}?text=${message}`;
        }
    </script>
</body>
</html>
